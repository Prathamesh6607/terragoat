name: Checkov IaC scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/aws
          framework: terraform
          output_format: sarif
          output_file_path: results/checkov.sarif
          soft_fail: false
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results/checkov.sarif

- name: Run Checkov (filtered)
  uses: bridgecrewio/checkov-action@master
  with:
    directory: terraform/aws
    framework: terraform
    check: CKV_AWS_20,CKV_AWS_21,CKV_AWS_18,CKV_AWS_79
    output_format: sarif
    output_file_path: results/checkov.sarif
    soft_fail: false
